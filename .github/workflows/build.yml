name: Build
on: [push, pull_request, workflow_dispatch]

jobs:
  version:
    name: Extract Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract-version.outputs.result }}
    steps:
      - uses: actions/checkout@v4
      - name: CMake Configure
        id: extract-version
        run: |
          # Use a dummy configure to extract the version string
          cmake -S . -B build -G Ninja -DBUILD_CLIENT=NO || true
          VERSION=$(cat build/version.txt 2>/dev/null || echo "0.0.1")
          echo "VERSION: ${VERSION}"
          echo "result=${VERSION}" >> $GITHUB_OUTPUT

  xbox:
    name: Original Xbox
    runs-on: ubuntu-latest
    needs: version
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Compilers
        run: |
          sudo apt-get update
          sudo apt-get install -y clang lld llvm make python3

      - name: Clone Official NXDK
        run: git clone --recursive https://github.com/XboxDev/nxdk.git nxdk

      - name: Compile ioq3ded
        run: |
          export NXDK_DIR=$(pwd)/nxdk
          export PATH=$NXDK_DIR/bin:$PATH
          make -f Makefile.nxdk

      - name: Upload Xbox Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-xbox-${{ needs.version.outputs.version }}
          path: |
            **/*.xbe
            **/*.iso

  check-is-release:
    if: github.event_name != 'pull_request'
    name: Check For Release Tag
    runs-on: ubuntu-latest
    needs: version
    outputs:
      is-release: ${{ steps.is-release-test.outputs.result }}
    steps:
      - uses: actions/checkout@v4
      - name: Check Release Tag
        id: is-release-test
        run: |
          GIT_TAG=$(git describe --exact-match --tags || true)
          if [[ -z "${GIT_TAG}" || "${{ github.ref_type }}" != 'tag' ]]; then
            echo "result=false" >> $GITHUB_OUTPUT
          elif [[ "${GIT_TAG}" = "${{ needs.version.outputs.version }}" ]]; then
            echo "result=true" >> $GITHUB_OUTPUT
          else
            echo "result=false" >> $GITHUB_OUTPUT
          fi

  release:
    name: Release
    if: github.event_name != 'pull_request' && needs.check-is-release.outputs.is-release == 'true'
    runs-on: ubuntu-latest
    needs:
      - version
      - check-is-release
      - xbox
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare Release Artifacts
        run: |
          mkdir release-artifacts
          
          XBOX_DIR="artifacts/${{ github.event.repository.name }}-xbox-${{ needs.version.outputs.version }}"
          if [ -d "$XBOX_DIR" ]; then
            zip -r9 "release-artifacts/${{ github.event.repository.name }}-xbox-${{ needs.version.outputs.version }}.zip" "$XBOX_DIR"
          fi

      - name: Publish Release Artifacts
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref }}
          name: Release ${{ needs.version.outputs.version }}
          files: release-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
